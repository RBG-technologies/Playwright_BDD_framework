<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test History Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --hover-bg: #2d3e5a;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { 
            margin-bottom: 3rem; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 2rem; margin: 0; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { color: var(--text-dim); font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .card { 
            background: var(--card-bg); 
            padding: 1.5rem; 
            border-radius: 1rem; 
            border: 1px solid var(--border); 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
            opacity: 0.5;
        }
        .card h3 { 
            margin: 0 0 0.5rem 0; 
            font-size: 1.1rem; 
            word-break: break-all;
            color: var(--text-main);
        }
        .card .date { 
            font-size: 0.85rem; 
            color: var(--text-dim); 
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .links { display: flex; gap: 0.75rem; }
        .btn { 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-allure { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.2); }
        .btn-allure:hover { background: rgba(56, 189, 248, 0.2); }
        .btn-cucumber { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .btn-cucumber:hover { background: rgba(34, 197, 94, 0.2); }
        .empty-state { text-align: center; padding: 4rem; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Test History Dashboard</h1>
                <p class="stats">Showing 4 recent executions</p>
            </div>
            <div class="stats">Last updated: 1/5/2026, 6:47:36 pm</div>
        </header>
        <div class="grid">
            
            <div class="card">
                <h3>demotestcase</h3>
                <div class="date"><i class="far fa-clock"></i> 1/5/2026, 6:47:36 pm</div>
                <div class="links">
                    <a href="./demotestcase_2026-05-01_18-47-36/allure/index.html" class="btn btn-allure"><i class="fas fa-chart-line"></i> Allure</a>
                    <a href="./demotestcase_2026-05-01_18-47-36/cucumber/index.html" class="btn btn-cucumber"><i class="fas fa-leaf"></i> Cucumber</a>
                </div>
            </div>
            <div class="card">
                <h3>csvdemo</h3>
                <div class="date"><i class="far fa-clock"></i> 23/4/2026, 7:38:23 pm</div>
                <div class="links">
                    <a href="./csvdemo_2026-04-23_19-38-23/allure/index.html" class="btn btn-allure"><i class="fas fa-chart-line"></i> Allure</a>
                    <a href="./csvdemo_2026-04-23_19-38-23/cucumber/index.html" class="btn btn-cucumber"><i class="fas fa-leaf"></i> Cucumber</a>
                </div>
            </div>
            <div class="card">
                <h3>csvdemo</h3>
                <div class="date"><i class="far fa-clock"></i> 23/4/2026, 7:38:22 pm</div>
                <div class="links">
                    <a href="./csvdemo_2026-04-23_19-38-22/allure/index.html" class="btn btn-allure"><i class="fas fa-chart-line"></i> Allure</a>
                    
                </div>
            </div>
            <div class="card">
                <h3>csvdemo</h3>
                <div class="date"><i class="far fa-clock"></i> 23/4/2026, 6:33:16 pm</div>
                <div class="links">
                    <a href="./csvdemo_2026-04-23_18-33-15/allure/index.html" class="btn btn-allure"><i class="fas fa-chart-line"></i> Allure</a>
                    <a href="./csvdemo_2026-04-23_18-33-15/cucumber/index.html" class="btn btn-cucumber"><i class="fas fa-leaf"></i> Cucumber</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
